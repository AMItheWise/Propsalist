name: Feature request
description: Suggest a new feature or a meaningful improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the need or workflow gap.
      placeholder: Proposal generation should support multiple saved profiles.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any workarounds or alternate ideas.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, code references, or implementation notes.
